<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title></title>
    <meta name="description" id="meta-desc" content="">
    <meta name="keywords" id="meta-keywords" content="">
    
    <style>
        /* ==========================================================================
           0. VARIABLES DE COULEURS ET TYPOGRAPHIE DYNAMIQUES
           ========================================================================== */
        :root {
            /* Couleurs */
            --color-cadre: #12328a;  
            --color-action: #ff0000; 
            --color-fond: #ffffff;   
            --color-texte: #333333;  
            --color-titre: #000000;  

            /* Typographie (Valeurs par défaut, écrasées par recap_typo.txt) */
            --font-nav: 'Lato', sans-serif; --size-nav: 1.27rem; --weight-nav: 700; --transform-nav: uppercase; --style-nav: normal;
            --font-contact: 'Lato', sans-serif; --size-contact: 1rem; --weight-contact: 400; --transform-contact: uppercase; --style-contact: normal;
            --font-social: 'Lato', sans-serif; --size-social: 0.9rem; --weight-social: 700; --transform-social: uppercase; --style-social: normal;
            --font-table: 'Lato', sans-serif; --size-table: 0.81rem; --weight-table: 400; --weight-table-bold: 700; --transform-table: uppercase; --style-table: normal;
            --font-slogan: 'Lato', sans-serif; --size-slogan: 2.54rem; --weight-slogan: 300; --transform-slogan: none; --style-slogan: italic;
            --font-section-header: 'Lato', sans-serif; --size-section-header: 1rem; --weight-section-header: 700; --transform-section-header: uppercase; --style-section-header: normal;
            --font-project-sub: 'Lato', sans-serif; --size-project-sub: 1.27rem; --weight-project-sub: 700; --transform-project-sub: uppercase; --style-project-sub: normal;
            --font-key-points: 'Lato', sans-serif; --size-key-points: 0.9rem; --weight-key-points: 700; --transform-key-points: uppercase; --style-key-points: normal;
            --font-body-text: 'Lato', sans-serif; --size-body-text: 1.09rem; --weight-body-text: 400; --transform-body-text: none; --style-body-text: normal;
            --font-team-name: 'Lato', sans-serif; --size-team-name: 1.27rem; --weight-team-name: 900; --transform-team-name: uppercase; --style-team-name: normal;
            --font-cv: 'Lato', sans-serif; --size-cv: 1rem; --weight-cv: 400; --transform-cv: none; --style-cv: normal;
        }

        /* ==========================================================================
           0.1 POLICE LATO (LOCAL)
           ========================================================================== */
        @font-face { font-family: 'Lato'; src: url('Typo/Lato/Lato-Light.ttf') format('truetype'); font-weight: 300; }
        @font-face { font-family: 'Lato'; src: url('Typo/Lato/Lato-Regular.ttf') format('truetype'); font-weight: 400; }
        @font-face { font-family: 'Lato'; src: url('Typo/Lato/Lato-Bold.ttf') format('truetype'); font-weight: 700; }
        @font-face { font-family: 'Lato'; src: url('Typo/Lato/Lato-Black.ttf') format('truetype'); font-weight: 900; }

        /* ==========================================================================
           1. RESPONSIVITÉ HOMOTHÉTIQUE ET MOBILE
           ========================================================================== */
        html { font-size: 11px; } 

        @media (max-width: 1600px) and (min-width: 1101px) {
            html { font-size: 0.6875vw; } 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; font-weight: 400; font-size: 1rem; background-color: var(--color-fond); color: var(--color-texte); line-height: 1.4; display: flex; min-height: 100vh; text-transform: uppercase; transition: background-color 0.3s, color 0.3s; }

        /* ==========================================================================
           2. LAYOUT : COLONNES ET GABARIT (DESKTOP)
           ========================================================================== */
        .sidebar { width: 600px; flex-shrink: 0; padding: 20px 30px; position: sticky; top: 0; height: 100vh; overflow-y: auto; border-right: 5px solid transparent; display: flex; flex-direction: column; }
        .main-content { flex-grow: 1; display: flex; justify-content: center; padding: 20px 0; width: calc(100% - 600px); }
        .page-section { width: 1000px; max-width: 100%; padding: 0 30px; display: none; animation: fadeIn 0.4s ease-in-out; }

        @media (max-width: 1600px) and (min-width: 1101px) {
            .sidebar { width: 37.5vw; }
            .main-content { width: 62.5vw; }
        }

        /* --- UTILITAIRES DESKTOP / MOBILE --- */
        .mobile-only { display: none; }
        .desktop-only { display: block; margin-top: auto; } /* margin-top:auto pousse les éléments en bas de la sidebar */

        /* --- ADAPTATION POUR ÉCRANS < 1100px (Tablettes, Mobiles et petits portables) --- */
        @media (max-width: 1100px) {
            html { font-size: 11px; } 
            body { flex-direction: column; } 
            
            /* Alignement parfait de la barre du haut, du contenu et du pied de page */
            .sidebar { width: 100%; max-width: 1000px; margin: 0 auto; height: auto; position: relative; border-right: none; padding: 20px; }
            .main-content { width: 100%; padding: 20px 0; }
            .page-section { padding: 0 20px; }
            
            .photo-grid, .team-grid, .details-grid, .details-footer { grid-template-columns: 1fr; gap: 20px; }
            .details-footer .span-2 { grid-column: span 1; }
            
            .main-nav { flex-wrap: wrap; }
            .project-header { flex-wrap: wrap; }
            
            .image-placeholder { height: 300px; } 

            /* Gestion des éléments qui basculent en bas sur mobile */
            .desktop-only { display: none !important; }
            .mobile-only { display: block; }
            
            .mobile-footer { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 20px 40px 20px; }
            .mobile-footer .social-links { margin-top: 0; padding-top: 20px; }
        }

        .page-section.active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ÉLÉMENTS RÉCURRENTS --- */

        /* --- LOGO AVEC POCHOIR DYNAMIQUE --- */
        .logo { 
            display: block; 
            margin-bottom: 30px; 
            text-decoration: none; 
            width: 16.36rem; 
            max-width: 100%; 
            cursor: pointer; 
            
            /* On utilise le PNG comme un pochoir */
            background-color: var(--color-texte); 
            -webkit-mask-image: url('Images/Icones/logo.png');
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-image: url('Images/Icones/logo.png');
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            transition: background-color 0.3s ease;
        }
        
        .logo:hover {
            background-color: var(--color-action); /* Changement de couleur au survol */
        }
        
        .logo img { 
            width: 100%; 
            height: auto; 
            display: block; 
            opacity: 0; /* On rend la vraie image invisible pour ne laisser voir que le fond découpé */
        }

        .main-nav { display: flex; gap: 20px; margin-bottom: 30px; font-family: var(--font-nav); font-size: var(--size-nav); font-weight: var(--weight-nav); text-transform: var(--transform-nav); font-style: var(--style-nav); }
        .main-nav a { text-decoration: none; color: var(--color-texte); padding-bottom: 2px; border-bottom: 5px solid transparent; transition: color 0.3s ease, border-color 0.3s ease; cursor: pointer;}
        .main-nav a:hover { color: var(--color-action); border-bottom-color: var(--color-action); }
        .main-nav a.active { color: var(--color-action); border-bottom: 5px solid var(--color-action); }
        
        .info-block { margin-bottom: 40px; color: var(--color-texte); font-family: var(--font-contact); font-size: var(--size-contact); font-weight: var(--weight-contact); text-transform: var(--transform-contact); font-style: var(--style-contact); }
        
        /* Réseaux et Copyright (utilisés dans sidebar ET mobile-footer) */
        .social-links { display: flex; gap: 15px; }
        .desktop-only .social-links { padding-top: 40px; } /* Espacement uniquement pour la version desktop */
        
        .social-links a { text-decoration: none; color: var(--color-texte); border: 5px solid var(--color-texte); padding: 4px 8px; font-family: var(--font-social); font-size: var(--size-social); font-weight: var(--weight-social); text-transform: var(--transform-social); font-style: var(--style-social); transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease; }
        .social-links a:hover, .social-links a:active { background-color: var(--color-action); color: var(--color-fond); border-color: var(--color-action); }
        .copyright { margin-top: 20px; font-family: var(--font-contact); font-size: var(--size-table); text-transform: none; color: var(--color-texte); }

        /* --- TABLEAU SIDEBAR --- */
        .table-works { width: 100%; border-collapse: collapse; margin-top: 10px; display: none; color: var(--color-texte); font-family: var(--font-table); font-size: var(--size-table); text-transform: var(--transform-table); font-style: var(--style-table); } 
        .table-works th, .table-works td { padding: 5px 2px; border-bottom: 1px solid var(--color-texte); transition: background-color 0.3s ease, color 0.3s ease, padding-left 0.3s ease; }
        .table-works th { border-top: 1px double var(--color-texte); border-bottom: 1px double var(--color-texte); font-weight: var(--weight-table-bold); color: var(--color-texte); }
        
        .table-works tr th:first-child, .table-works tr td:first-child { width: 15%; text-align: left; }
        .table-works tr th:not(:first-child), .table-works tr td:not(:first-child) { width: 21.25%; text-align: center; }
        .table-works tr td:nth-child(2) { font-weight: var(--weight-table-bold); }

        .work-link { cursor: pointer; }
        .work-link:hover td { background-color: var(--color-action); color: var(--color-fond) !important; border-color: var(--color-action); }
        .work-link:hover td:first-child { padding-left: 6px; }

        /* --- STYLES RÉCURRENTS & TEXTES --- */
        .blue-frame { background-color: var(--color-cadre); padding: 5px; position: relative; margin-bottom: 15px; transition: background-color 0.3s; }
        .section-header { display: flex; justify-content: space-between; border-top: 1px solid var(--color-texte); border-bottom: 1px solid var(--color-texte); padding: 4px 0; margin-bottom: 30px; font-family: var(--font-section-header); font-size: var(--size-section-header); font-weight: var(--weight-section-header); text-transform: var(--transform-section-header); font-style: var(--style-section-header); color: var(--color-texte); }
        .text-block { column-gap: 40px; text-align: justify; margin-bottom: 30px; color: var(--color-texte); font-family: var(--font-body-text); font-size: var(--size-body-text); font-weight: var(--weight-body-text); text-transform: var(--transform-body-text); font-style: var(--style-body-text); }
        
        .image-placeholder, .portrait-placeholder, .slide { background-color: var(--color-fond); filter: brightness(0.95); background-image: radial-gradient(var(--color-texte) 1px, transparent 1px); background-size: 15px 15px; display: flex; align-items: center; justify-content: center; color: var(--color-texte); text-align: center; overflow: hidden; }
        .image-placeholder { height: 450px; font-size: 1.63rem; }
        .portrait-placeholder { height: 400px; font-size: 1.63rem; }
        .image-placeholder img, .portrait-placeholder img, .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* --- ACCUEIL --- */
        .catchphrase-container { border-top: 1px solid var(--color-texte); border-bottom: 1px solid var(--color-texte); padding: 30px 0; margin-bottom: 40px; text-align: center; }
        .catchphrase { font-family: var(--font-slogan); font-size: var(--size-slogan); font-weight: var(--weight-slogan); font-style: var(--style-slogan); text-transform: var(--transform-slogan); letter-spacing: -0.5px; color: var(--color-texte); }
        
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        /* Conteneur de grille sans contour, cadre fixe pour le zoom */
        .grid-item { aspect-ratio: 1 / 1; background-color: transparent; padding: 0; cursor: pointer; overflow: hidden; }
        .grid-item > div { width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .grid-item:hover > div { transform: scale(1.05); } 
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* --- PROJETS & CARROUSEL --- */
        .project { margin-bottom: 80px; scroll-margin-top: 20px; }
        .project-header { display: flex; justify-content: space-between; border-top: 1px solid var(--color-texte); border-bottom: 1px solid var(--color-texte); padding: 4px 0; margin-bottom: 15px; font-family: var(--font-section-header); font-size: var(--size-section-header); font-weight: var(--weight-section-header); text-transform: var(--transform-section-header); font-style: var(--style-section-header); gap: 10px; color: var(--color-texte); }
        
        #projects-list .carousel-viewport { width: 100%; aspect-ratio: 1.85 / 1; height: auto; background: none; border: none; padding: 0; overflow: hidden; position: relative; }
        #projects-list .carousel-track { height: 100%; display: flex; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        #projects-list .blue-frame { padding: 0; background: none; }
        #projects-list .slide { min-width: 100%; height: 100%; background: none; font-size: 2.18rem; }
        #projects-list .slide img { width: 100%; height: 100%; object-fit: contain; }
        
        /* ZONES DE CLICS ET FLÈCHES DYNAMIQUES */
        .click-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 10; cursor: pointer; display: flex; align-items: center; }
        .zone-left { left: 0; justify-content: flex-start; }
        .zone-right { right: 0; justify-content: flex-end; }
        
        .arrow-icon {
            /* MODIFICATION ICI : Taille réduite de moitié */
            width: 1.75rem; 
            height: 1.75rem; 
            background-color: var(--color-texte); 
            transition: background-color 0.3s ease;
            margin: 0 10px; /* Petit espacement par rapport au bord absolu */
        }
        
        .click-zone:hover .arrow-icon {
            background-color: var(--color-action); /* Changement de couleur au survol de la zone */
        }

        .icon-left {
            -webkit-mask-image: url('Images/Icones/fleche_gauche.png');
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-image: url('Images/Icones/fleche_gauche.png');
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
        }

        .icon-right {
            -webkit-mask-image: url('Images/Icones/fleche_droite.png');
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-image: url('Images/Icones/fleche_droite.png');
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
        }

        /* Textes sous le carrousel */
        .project-desc { display: flex; flex-direction: column; gap: 10px; }
        .project-desc-id { font-family: var(--font-project-sub); font-size: var(--size-project-sub); font-weight: var(--weight-project-sub); text-transform: var(--transform-project-sub); font-style: var(--style-project-sub); margin-bottom: 10px; color: var(--color-texte); }
        .key-points { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        .key-item { display: flex; align-items: center; gap: 10px; font-family: var(--font-key-points); font-size: var(--size-key-points); font-weight: var(--weight-key-points); text-transform: var(--transform-key-points); font-style: var(--style-key-points); margin-bottom: 4px; color: var(--color-texte); }
        .dot { width: 5px; height: 5px; background-color: var(--color-texte); border-radius: 50%; flex-shrink: 0; }
        .project-text { text-align: justify; line-height: 1.5; color: var(--color-texte); font-family: var(--font-body-text); font-size: var(--size-body-text); font-weight: var(--weight-body-text); text-transform: var(--transform-body-text); font-style: var(--style-body-text); }
        .project-text p { margin-bottom: 15px; }

        .global-details { margin-top: 50px; font-family: var(--font-body-text); font-size: var(--size-body-text); font-weight: var(--weight-body-text); text-transform: var(--transform-body-text); font-style: var(--style-body-text); color: var(--color-texte); }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; border-top: 1px solid var(--color-texte); border-bottom: 1px solid var(--color-texte); padding: 15px 0; color: var(--color-texte); }
        .col-title { font-weight: bold; color: var(--color-texte); }
        .details-grid div { text-transform: none; text-align: left; }
        .details-footer { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; border-bottom: 1px solid var(--color-texte); padding: 10px 0; margin-bottom: 40px; text-transform: none; color: var(--color-texte); }
        .details-footer .span-2 { grid-column: span 2; }

        /* --- COLLINE --- */
        #section-colline .blue-frame { background-color: transparent; border: none; padding: 0; margin-bottom: 25px; }
        #section-colline .image-placeholder { height: auto; background: none; padding: 0; }
        #section-colline .image-placeholder img { width: 100%; height: auto; display: block; }
        #section-colline .portrait-placeholder { width: 100%; aspect-ratio: 1 / 1; height: auto; background: none; padding: 0; }
        #section-colline .portrait-placeholder img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .philosophy-text { font-family: var(--font-slogan); font-size: var(--size-slogan); font-weight: var(--weight-slogan); font-style: var(--style-slogan); text-transform: var(--transform-slogan); margin-bottom: 20px; letter-spacing: -0.5px; color: var(--color-texte); }
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .member-name { font-family: var(--font-team-name); font-size: var(--size-team-name); font-weight: var(--weight-team-name); text-transform: var(--transform-team-name); font-style: var(--style-team-name); border-bottom: 1px solid var(--color-texte); padding-bottom: 5px; margin-bottom: 10px; color: var(--color-texte); }
        .member-cv { font-family: var(--font-cv); font-size: var(--size-cv); font-weight: var(--weight-cv); text-transform: var(--transform-cv); font-style: var(--style-cv); color: var(--color-texte); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a onclick="switchPage('accueil')" class="logo"><img src="Images/Icones/logo.png" alt="Logo"></a>
        <nav class="main-nav">
            <a id="nav-projets" onclick="switchPage('projets')">PROJETS</a>
            <a id="nav-colline" onclick="switchPage('colline')">LA COLLINE</a>
        </nav>
        <div class="info-block" id="dynamic-contact-info"></div>
        <table class="table-works" id="dynamic-table-works">
            <thead><tr><th>N°</th><th>TITRE</th><th>TYPE</th><th>LIEU</th><th>ANNÉE</th></tr></thead>
            <tbody id="table-body-projets"></tbody>
        </table>
        
        <div class="desktop-only">
            <div class="social-links">
                <a href="https://www.instagram.com/atelier.de.la.colline/" target="_blank">INSTAGRAM</a>
                <a href="https://fr.linkedin.com" target="_blank">LINKEDIN</a>
            </div>
            <div class="copyright dynamic-copyright"></div>
        </div>
    </aside>

    <main class="main-content">
        <div id="section-accueil" class="page-section">
            <div class="catchphrase-container"><h1 class="catchphrase" id="home-slogan"></h1></div>
            <div class="photo-grid" id="mainGrid"></div>
        </div>

        <div id="section-projets" class="page-section" id="projects-container">
            <div id="projects-list"></div>
        </div>

        <div id="section-colline" class="page-section">
            <section class="about-section">
                <div class="section-header"><div>01 PHILOSOPHIE</div><div>AGENCE</div></div>
                <div class="philosophy-text" id="colline-philo"></div>
            </section>
            
            <section class="about-section" id="approche-1">
                <div class="section-header"><div>02 NOTRE APPROCHE</div><div>VISION</div></div>
                <div class="text-block" id="colline-approche-1"></div>
                <div class="full-width-image" id="photo-approche">
                    <div class="blue-frame">
                        <div class="image-placeholder" data-thumbnail="Images/Couverture/vignette_approche.jpg">
                            <img src="Images/Couverture/photo_approche.jpg" alt="Notre Approche">
                        </div>
                    </div>
                </div>
                <div class="text-block" style="margin-top: 20px;" id="colline-approche-2"></div>
            </section>
            
            <section class="about-section">
                <div class="section-header"><div>03 L'ÉQUIPE</div><div>ASSOCIES</div></div>
                <div class="team-grid" id="team-grid-container"></div>
            </section>
        </div>
    </main>

    <footer class="mobile-footer mobile-only">
        <div class="social-links">
            <a href="https://www.instagram.com/atelier.de.la.colline/" target="_blank">INSTAGRAM</a>
            <a href="https://fr.linkedin.com" target="_blank">LINKEDIN</a>
        </div>
        <div class="copyright dynamic-copyright"></div>
    </footer>

    <script>
        const seoData = { general: { title: "", desc: "", keys: "" }, accueil: { title: "", desc: "", keys: "" }, projets: { title: "", desc: "", keys: "" }, colline: { title: "", desc: "", keys: "" } };

        function loadSEO() {
            fetch('Texte/seo.txt?nocache=' + new Date().getTime()).then(r => r.text()).then(text => {
                const blocks = text.split('[');
                blocks.forEach(block => {
                    if(!block.trim()) return;
                    const pageMatch = block.match(/^([^\]]+)\]/);
                    if(pageMatch) {
                        const pageKey = pageMatch[1].toLowerCase().trim();
                        const titleMatch = block.match(/Titre\s*:\s*(.+)/i);
                        const descMatch = block.match(/Description\s*:\s*(.+)/i);
                        const keysMatch = block.match(/Keywords\s*:\s*(.+)/i);
                        if(!seoData[pageKey]) seoData[pageKey] = {};
                        if(titleMatch) seoData[pageKey].title = titleMatch[1].trim();
                        if(descMatch) seoData[pageKey].desc = descMatch[1].trim();
                        if(keysMatch) seoData[pageKey].keys = keysMatch[1].trim();
                    }
                });
                const currentPage = window.location.hash.replace('#', '') || 'accueil';
                const specific = seoData[currentPage] || {};
                const gen = seoData['general'] || {};
                document.title = specific.title || gen.title || "";
                document.getElementById('meta-desc').setAttribute('content', specific.desc || gen.desc || "");
                document.getElementById('meta-keywords').setAttribute('content', specific.keys || gen.keys || "");
            }).catch(e => console.log("Fichier seo.txt non trouvé."));
        }

        function loadTypo() {
            fetch('Typo/recap_typo.txt?nocache=' + new Date().getTime()).then(r => r.text()).then(text => {
                const mappings = { "Menu Principal": "nav", "Bloc Contact": "contact", "Réseaux Sociaux": "social", "Slogan": "slogan", "En-têtes de Section": "section-header", "Sous-titres de Projet": "project-sub", "Points Clés": "key-points", "Corps de Texte": "body-text", "Nom du membre": "team-name", "Biographie": "cv" };
                const parseWeight = (v) => { if (v.includes('Light')) return '300'; if (v.includes('Regular')) return '400'; if (v.includes('Bold')) return '700'; if (v.includes('Black')) return '900'; return '400'; };
                let currentPrefix = null;
                text.split('\n').forEach(line => {
                    const cleanLine = line.trim();
                    if (!cleanLine) return;
                    for (const [key, prefix] of Object.entries(mappings)) { if (cleanLine.includes(key)) { currentPrefix = prefix; break; } }
                    if (cleanLine.includes("En-têtes (N°, TITRE...)")) currentPrefix = "table-header";
                    else if (cleanLine.includes("Cellules classiques")) currentPrefix = "table-cell";
                    else if (cleanLine.includes("Titres du tableau")) currentPrefix = "table-title";
                    if (currentPrefix) {
                        if (cleanLine.toLowerCase().startsWith("- police") || cleanLine.toLowerCase().startsWith("police")) {
                            const val = cleanLine.split(':')[1].trim();
                            const fontName = val.split(' ')[0];
                            const weight = parseWeight(val);
                            if (currentPrefix.startsWith("table-")) { document.documentElement.style.setProperty('--font-table', `'${fontName}', sans-serif`); if (currentPrefix === "table-header" || currentPrefix === "table-title") { document.documentElement.style.setProperty('--weight-table-bold', weight); } else { document.documentElement.style.setProperty('--weight-table', weight); } } 
                            else { document.documentElement.style.setProperty(`--font-${currentPrefix}`, `'${fontName}', sans-serif`); document.documentElement.style.setProperty(`--weight-${currentPrefix}`, weight); }
                        }
                        else if (cleanLine.toLowerCase().startsWith("- taille") || cleanLine.toLowerCase().startsWith("taille")) {
                            const size = cleanLine.match(/[\d.]+rem/);
                            if (size) document.documentElement.style.setProperty(`--size-${currentPrefix.startsWith("table-") ? "table" : currentPrefix}`, size[0]);
                        }
                        else if (cleanLine.toLowerCase().startsWith("- style") || cleanLine.toLowerCase().startsWith("style")) {
                            const val = cleanLine.toLowerCase();
                            let target = currentPrefix.startsWith("table-") ? "table" : currentPrefix;
                            document.documentElement.style.setProperty(`--transform-${target}`, val.includes('majuscule') ? 'uppercase' : 'none');
                            document.documentElement.style.setProperty(`--style-${target}`, val.includes('italique') ? 'italic' : 'normal');
                        }
                    }
                });
            }).catch(e => console.log("Fichier recap_typo.txt non trouvé."));
        }

        function loadColors() {
            fetch('Couleur/couleur.txt?nocache=' + new Date().getTime()).then(r => r.text()).then(text => {
                text.split('\n').forEach(line => {
                    const parts = line.split(':');
                    if (parts.length >= 2) {
                        const name = parts[0].trim().toLowerCase();
                        let value = parts[1].trim().replace(/\s/g, ''); 
                        if (/^[0-9A-Fa-f]{3,6}$/.test(value)) value = '#' + value;
                        if (name.includes('cadre')) document.documentElement.style.setProperty('--color-cadre', value);
                        if (name.includes('action')) document.documentElement.style.setProperty('--color-action', value);
                        if (name.includes('fond')) document.documentElement.style.setProperty('--color-fond', value);
                        if (name.includes('texte')) document.documentElement.style.setProperty('--color-texte', value);
                        if (name.includes('titre')) document.documentElement.style.setProperty('--color-titre', value);
                    }
                });
            }).catch(e => console.log("Fichier couleur non trouvé."));
        }

        function loadContact() {
            fetch('Texte/contact.txt').then(r => r.text()).then(text => document.getElementById('dynamic-contact-info').innerHTML = text.replace(/\n/g, '<br>'));
        }

        function loadAllTexts() {
            fetch('Texte/accueil.txt').then(r => r.text()).then(text => {
                const sloganMatch = text.match(/Section Accueil - Slogan\s*:\s*([\s\S]+)$/i);
                if (sloganMatch) document.getElementById('home-slogan').innerText = sloganMatch[1].trim();
                const copyMatch = text.match(/Sidebar - Copyright\s*:\s*([\s\S]*?)(?=Section Accueil)/i);
                if (copyMatch) {
                    document.querySelectorAll('.dynamic-copyright').forEach(el => el.innerHTML = copyMatch[1].trim().replace(/\n/g, '<br>'));
                }
            });

            fetch('Texte/colline.txt').then(r => r.text()).then(text => {
                const philoMatch = text.match(/01 Philosophie[\s\S]*?Texte\s*:\s*([\s\S]*?)(?=Section La Colline - 02|$)/i);
                if (philoMatch) document.getElementById('colline-philo').innerText = philoMatch[1].trim();
                const appBloc1 = text.match(/Texte bloc 1\s*:\s*([\s\S]*?)(?=Texte bloc 2\s*:)/i);
                if (appBloc1) document.getElementById('colline-approche-1').innerHTML = appBloc1[1].trim().replace(/\n/g, '<br>');
                const appBloc2 = text.match(/Texte bloc 2\s*:\s*([\s\S]*?)(?=Section La Colline - 03|$)/i);
                if (appBloc2) document.getElementById('colline-approche-2').innerHTML = appBloc2[1].trim().replace(/\n/g, '<br>');
            });

            fetch('Texte/projets.txt').then(r => r.text()).then(text => {
                const container = document.getElementById('projects-list');
                const tableBody = document.getElementById('table-body-projets');
                container.innerHTML = ""; tableBody.innerHTML = "";
                text.split(/Section Projets - /i).filter(b => b.trim() !== "").forEach((block) => {
                    if (block.toLowerCase().startsWith("projet")) {
                        const id = block.match(/Projet\s+(\d+)/i)?.[1] || "0";
                        const titre = block.match(/Titre\s*:\s*(.+)/i)?.[1] || "";
                        const type = block.match(/Type\s*:\s*(.+)/i)?.[1] || "";
                        const annee = block.match(/Année\s*:\s*(.+)/i)?.[1] || "";
                        const lieu = block.match(/Lieu\s*:\s*(.+)/i)?.[1] || "";
                        const client = block.match(/Client\s*:\s*(.+)/i)?.[1] || "";
                        const etat = block.match(/(?:État|Etat)\s*:\s*(.+)/i)?.[1] || "";
                        const budget = block.match(/Budget\s*:\s*(.+)/i)?.[1] || "";
                        const surface = block.match(/Surface\s*:\s*(.+)/i)?.[1] || "";
                        const sousTitre = block.match(/Sous-titre\s*:\s*(.+)/i)?.[1] || "";
                        const descRaw = block.match(/Texte\s*:\s*([\s\S]+)/i)?.[1] || "";
                        const nbImagesMatch = block.match(/Nombre d'images\s*:\s*(\d+)/i);
                        const nbImages = nbImagesMatch ? parseInt(nbImagesMatch[1]) : 3;
                        const paragraphs = descRaw.trim().split(/\n\s*\n/).map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');
                        
                        let slidesHtml = '';
                        for (let i = 0; i < nbImages; i++) {
                            slidesHtml += `<div class="slide"><img src="Images/Projet/Projet ${id}/${i}.jpg" onerror="this.style.display='none'; this.parentNode.innerHTML='IMAGE ${id}.${i}'"></div>`;
                        }
                        
                        let vignettePath = `Images/Projet/Projet ${id}/vignette_projet${id}.jpg`;
                        
                        container.innerHTML += `
                            <article class="project" id="project-${id}" data-thumbnail="${vignettePath}">
                                <div class="project-header"><div>${id}</div><div>${titre}</div><div>${type}</div><div>${lieu}</div><div>${annee}</div></div>
                                <div class="blue-frame">
                                    <div class="carousel-viewport" data-current-index="0">
                                        <div class="click-zone zone-left" onclick="moveCarousel(this, -1)">
                                            <div class="arrow-icon icon-left"></div>
                                        </div>
                                        <div class="click-zone zone-right" onclick="moveCarousel(this, 1)">
                                            <div class="arrow-icon icon-right"></div>
                                        </div>
                                        <div class="carousel-track">${slidesHtml}</div>
                                    </div>
                                </div>
                                <div class="project-desc">
                                    <div class="project-desc-id">${sousTitre}</div>
                                    <div class="key-points">
                                        ${client ? `<div class="key-item"><div class="dot"></div> CLIENT : ${client}</div>` : ''}
                                        ${etat ? `<div class="key-item"><div class="dot"></div> ÉTAT : ${etat}</div>` : ''}
                                        ${budget ? `<div class="key-item"><div class="dot"></div> BUDGET : ${budget}</div>` : ''}
                                        ${surface ? `<div class="key-item"><div class="dot"></div> SURFACE : ${surface}</div>` : ''}
                                    </div>
                                    <div class="project-text">${paragraphs}</div>
                                </div>
                            </article>`;
                        tableBody.innerHTML += `<tr class="work-link" onclick="customSmoothScroll('project-${id}')"><td>${id}</td><td>${titre}</td><td>${type}</td><td>${lieu}</td><td>${annee}</td></tr>`;
                    } else if (block.toLowerCase().startsWith("détails globaux")) {
                        const t = block.match(/Titre\s*:\s*(.+)/i)?.[1] || "";
                        const c2 = block.match(/Colonne 2\s*:\s*(.+)/i)?.[1] || "";
                        const c3 = block.match(/Colonne 3\s*:\s*(.+)/i)?.[1] || "";
                        const l1 = block.match(/Ligne bas 1\s*:\s*(.+)/i)?.[1] || "";
                        const l2 = block.match(/Ligne bas 2\s*:\s*(.+)/i)?.[1] || "";
                        container.innerHTML += `<div class="global-details"><div class="details-grid"><div class="col-title">${t}</div><div>${c2}</div><div>${c3}</div></div><div class="details-footer"><div class="span-2">${l1}</div><div>${l2}</div></div></div>`;
                    }
                });
            });
        }

        function loadTeamProfiles() {
            fetch('Texte/equipe.txt').then(r => r.text()).then(text => {
                const container = document.getElementById('team-grid-container');
                container.innerHTML = "";
                text.split(/Profil \d+/i).filter(b => b.trim() !== "").forEach((block, i) => {
                    const name = block.match(/prénom et nom\s*:\s*(.+)/i)?.[1] || "NOM";
                    const bio = block.match(/présentation\s*:\s*([\s\S]+)/i)?.[1] || "";
                    const indexProfil = i + 1;
                    container.innerHTML += `
                        <div class="team-member" id="team-member-${indexProfil}">
                            <div class="blue-frame"><div class="portrait-placeholder"><img src="Images/Equipe/Profil_${indexProfil}.jpg" alt="${name}" onerror="this.style.display='none'; this.parentNode.innerHTML='PHOTO ${indexProfil}'"></div></div>
                            <div class="member-name">${name}</div><div class="member-cv">${bio.replace(/\n/g, '<br>')}</div>
                        </div>`;
                });
            });
        }

        function switchPage(pageName) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-page'));
            document.getElementById('section-' + pageName).classList.add('active-page');
            document.getElementById('nav-projets').classList.toggle('active', pageName === 'projets');
            document.getElementById('nav-colline').classList.toggle('active', pageName === 'colline');
            document.getElementById('dynamic-table-works').style.display = (pageName === 'projets') ? 'table' : 'none';
            history.pushState(null, null, '#' + pageName);
            const specific = seoData[pageName] || {};
            const gen = seoData['general'] || {};
            document.title = specific.title || gen.title || "";
            document.getElementById('meta-desc').setAttribute('content', specific.desc || gen.desc || "");
            document.getElementById('meta-keywords').setAttribute('content', specific.keys || gen.keys || "");
            if (pageName === 'accueil') generateGrid();
            window.scrollTo(0,0);
        }

        function generateGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const mustIncludeImages = [];
            const otherGrouped = {};
            document.querySelectorAll('.portrait-placeholder, .project, #photo-approche .image-placeholder').forEach(el => {
                const parentSection = el.closest('.page-section');
                if (!parentSection) return;
                const parentPage = parentSection.id.replace('section-', '');
                let targetId = '';
                let contentHtml = '';
                if (el.classList.contains('project')) {
                    targetId = el.id;
                    const vignetteUrl = el.getAttribute('data-thumbnail');
                    contentHtml = `<img src="${vignetteUrl}" alt="Vignette" style="width:100%; height:100%; object-fit:cover; display:block;" onerror="this.style.display='none'; this.parentNode.innerHTML='VIGNETTE'">`;
                } 
                else {
                    targetId = el.closest('[id]')?.id || '';
                    contentHtml = el.innerHTML;
                    if (el.hasAttribute('data-thumbnail')) {
                        contentHtml = `<img src="${el.getAttribute('data-thumbnail')}" alt="Vignette" style="width:100%; height:100%; object-fit:cover; display:block;" onerror="this.style.display='none'; this.parentNode.innerHTML='VIGNETTE'">`;
                    }
                }
                const data = { page: parentPage, target: targetId, html: contentHtml, isPortrait: el.classList.contains('portrait-placeholder'), isApproche: el.closest('#photo-approche') !== null };
                
                if (data.isPortrait || data.isApproche) { 
                    mustIncludeImages.push(data); 
                } 
                else { 
                    if (!otherGrouped[targetId]) otherGrouped[targetId] = []; 
                    otherGrouped[targetId].push(data); 
                }
            });
            const otherImages = [];
            for (const key in otherGrouped) {
                const group = otherGrouped[key];
                const randomIndex = Math.floor(Math.random() * group.length);
                otherImages.push(group[randomIndex]);
            }
            const shuffledOthers = otherImages.sort(() => Math.random() - 0.5);
            const combined = [...mustIncludeImages, ...shuffledOthers];
            let validLength = Math.floor(combined.length / 3) * 3;
            if (validLength < mustIncludeImages.length) { validLength = combined.length; }
            const finalGrid = combined.slice(0, validLength).sort(() => Math.random() - 0.5);
            finalGrid.forEach(p => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = `<div class="image-placeholder" style="height:100%; width:100%; font-size:0.81rem; background:none;">${p.html}</div>`;
                item.onclick = () => { switchPage(p.page); setTimeout(() => { if(p.target) customSmoothScroll(p.target); }, 150); };
                grid.appendChild(item);
            });
        }

        function moveCarousel(clickedZone, dir) {
            const vp = clickedZone.closest('.carousel-viewport');
            const track = vp.querySelector('.carousel-track');
            const totalSlides = track.children.length;
            let idx = (parseInt(vp.getAttribute('data-current-index')) || 0) + dir;
            if (idx < 0) { idx = totalSlides - 1; } 
            else if (idx >= totalSlides) { idx = 0; }
            vp.setAttribute('data-current-index', idx);
            track.style.transform = `translateX(-${idx * 100}%)`;
        }

        function customSmoothScroll(id) {
            const el = document.getElementById(id); 
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = () => { 
            loadSEO(); loadTypo(); loadColors(); loadContact(); loadAllTexts(); loadTeamProfiles();
            setTimeout(() => { switchPage(window.location.hash.replace('#', '') || 'accueil'); }, 300);
        };
    </script>
</body>
</html>
